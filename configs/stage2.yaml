task: stage2

data:
  manifest: artifacts/5sdata/stage2.csv
  normalize: true

model:
  channels: [32, 64, 128, 256]
  kernel_sizes: [15, 9, 7, 5]
  strides: [4, 4, 4, 4]
  hidden_dim: 128
  dropout: 0.2
  num_classes: 3

training:
  seed: 42
  epochs: 40
  batch_size: 64
  num_workers: 0
  pin_memory: false
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  early_stopping_patience: 8
  gradient_clip_norm: 1.0

output:
  base_dir: outputs/stage2
