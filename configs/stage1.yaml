task: stage1

data:
  manifest: artifacts/internoise_5sdata/stage1.csv
  normalize: true

model:
  channels: [32, 64, 128, 256]
  kernel_sizes: [15, 9, 7, 5]
  strides: [4, 4, 4, 4]
  hidden_dim: 128
  dropout: 0.2

training:
  seed: 42
  epochs: 40
  batch_size: 32
  num_workers: 0
  pin_memory: false
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  early_stopping_patience: 8
  gradient_clip_norm: 1.0
  regression_loss: smooth_l1

output:
  base_dir: outputs/stage1
