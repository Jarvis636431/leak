name: Compile Thesis

on:
  push:
    branches: [main]
    paths:
      - '2024-latex/**'
  pull_request:
    branches: [main]
    paths:
      - '2024-latex/**'
  workflow_dispatch:  # 手动触发

jobs:
  compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 2024-latex

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: 2024-latex
          latexmk_shell_escape: true
          latexmk_use_xelatex: true
          extra_system_packages: "fonts-noto-cjk"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: 2024-latex/main.pdf
